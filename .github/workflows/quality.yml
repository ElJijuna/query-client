name: Code Quality

on:
  pull_request:
    branches:
      - main
      - next
  push:
    branches:
      - main
      - next

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests with coverage
        run: npm run test:coverage
      
      - name: Generate test report (JSON)
        run: npm run test:json
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-final.json', 'utf8'));
            let totalStatements = 0, totalBranches = 0, totalFunctions = 0, totalLines = 0;
            let coveredStatements = 0, coveredBranches = 0, coveredFunctions = 0, coveredLines = 0;
            
            Object.values(coverage).forEach(file => {
              if (file.s) {
                Object.values(file.s).forEach(v => {
                  totalStatements++;
                  if (v > 0) coveredStatements++;
                });
              }
              if (file.b) {
                Object.values(file.b).forEach(v => {
                  totalBranches++;
                  if (v > 0) coveredBranches++;
                });
              }
              if (file.f) {
                Object.values(file.f).forEach(v => {
                  totalFunctions++;
                  if (v > 0) coveredFunctions++;
                });
              }
              if (file.l) {
                Object.values(file.l).forEach(v => {
                  totalLines++;
                  if (v > 0) coveredLines++;
                });
              }
            });
            
            const statementsCoverage = ((coveredStatements / totalStatements) * 100).toFixed(2);
            const branchCoverage = ((coveredBranches / totalBranches) * 100).toFixed(2);
            const functionCoverage = ((coveredFunctions / totalFunctions) * 100).toFixed(2);
            const lineCoverage = ((coveredLines / totalLines) * 100).toFixed(2);
            
            const comment = `## 📊 Code Coverage Report

            | Metric | Coverage |
            |--------|----------|
            | Statements | ${statementsCoverage}% |
            | Branches | ${branchCoverage}% |
            | Functions | ${functionCoverage}% |
            | Lines | ${lineCoverage}% |`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true
